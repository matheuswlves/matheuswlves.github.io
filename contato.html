<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>

<div class="w3-container w3-teal w3-center header">
    <h1>Contato</h1>
</div>

<div class="w3-container">
    <form>
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" class="w3-input"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" class="w3-input"><br>
        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" class="w3-input"></textarea><br>
        <button type="submit" class="w3-button w3-orange">Enviar</button>
    </form>
</div>

<a href="index.html" class="w3-button w3-blue">Voltar à Página Inicial</a>

</body>
