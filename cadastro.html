<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="style.css">
    <title>Cadastrar Prato</title>
    <script src="script.js"></script>
</head>
<body>

<div class="w3-container w3-teal w3-center header">
    <h1>Cadastrar Novo Prato</h1>
</div>

<div class="w3-container">
    <form id="formProduto">
        <label for="nomeProduto">Nome do Prato:</label><br>
        <input type="text" id="nomeProduto" class="w3-input" required><br>
        <label for="precoProduto">Preço:</label><br>
        <input type="number" id="precoProduto" class="w3-input" required><br>
        <button type="submit" class="w3-button w3-orange">Cadastrar</button>
    </form>
</div>

<a href="produtos.html" class="w3-button w3-blue">Ver Cardápio</a>
<a href="index.html" class="w3-button w3-blue">Voltar à Página Inicial</a>

</body>
</html>
